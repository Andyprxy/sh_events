<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>QR Mobile Pass | S&H Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                slate: { 850: '#1e293b', 900: '#0f172a' },
                gold: { DEFAULT: '#b89b5e', dark: '#a3884e' }
              }
            }
          }
        }
    </script>

    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* Simulating the bounds of a phone screen for clean screenshots */
        .mobile-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .heading-font { font-family: 'Oswald', sans-serif; }

        .glass-pass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 40px rgba(184, 155, 94, 0.15), 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 1.5rem;
        }

        /* Abstract Premium Background for Mobile */
        .mobile-glow {
            position: absolute;
            top: -10%; left: -20%; width: 150%; height: 60%;
            background: radial-gradient(circle, rgba(184,155,94,0.15) 0%, rgba(248,250,252,0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }

        /* Scanning Laser Animation */
        .scan-container { position: relative; overflow: hidden; }
        .laser {
            width: 100%; height: 2px;
            background: #b89b5e;
            box-shadow: 0 0 10px #b89b5e, 0 0 20px #b89b5e;
            position: absolute;
            top: 0; left: 0;
            animation: scan 2.5s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes scan {
            0%, 100% { top: 5%; opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { top: 95%; }
        }
    </style>
</head>
<body>

    <!-- Mobile Screen Wrapper -->
    <div class="mobile-container flex flex-col">
        <div class="mobile-glow"></div>
        
        <!-- Mobile Header -->
        <header class="relative z-10 p-6 flex justify-between items-center pt-12">
            <button class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center text-slate-600 hover:text-gold transition">
                <i class="fas fa-chevron-left text-sm"></i>
            </button>
            <span class="text-xs font-bold tracking-widest uppercase text-slate-800">E-Ticket</span>
            <button class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center text-slate-600 hover:text-gold transition">
                <i class="fas fa-ellipsis-v text-sm"></i>
            </button>
        </header>

        <!-- Digital Pass Card -->
        <div class="relative z-10 flex-1 px-6 pb-12 flex flex-col justify-center">
            
            <div class="glass-pass p-6 flex flex-col items-center relative overflow-hidden">
                <!-- Branding -->
                <img src="../sh.JPG" alt="Logo" class="h-10 mb-6 mix-blend-multiply">
                <h2 class="text-2xl heading-font uppercase text-slate-900 mb-1 text-center">G20 Leadership Summit</h2>
                <p class="text-xs text-slate-500 font-bold tracking-widest uppercase mb-8">Access Pass</p>
                
                <!-- QR Code Block -->
                <div class="bg-white p-4 rounded-xl shadow-inner border border-slate-100 mb-8 relative">
                    <div class="scan-container rounded-lg border-2 border-dashed border-gold/40 p-2 relative bg-white">
                        <div class="laser"></div>
                        <!-- FontAwesome QR Placeholder -->
                        <i class="fas fa-qrcode text-[160px] text-slate-900"></i>
                    </div>
                </div>

                <!-- Attendee Info -->
                <div class="w-full bg-slate-50 rounded-lg p-4 border border-slate-100 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-200 pb-3">
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Delegate</span>
                        <span class="text-sm font-bold text-slate-900">Dr. Alex Mercer</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-slate-200 pb-3">
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Organization</span>
                        <span class="text-sm font-bold text-slate-900">Dept. Public Works</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Status</span>
                        <div class="flex items-center gap-1.5 bg-green-100 px-2 py-0.5 rounded text-green-700">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            <span class="text-[10px] font-bold uppercase tracking-wider">Ready to Scan</span>
                        </div>
                    </div>
                </div>
                
                <!-- Bottom Decoration -->
                <div class="absolute -left-3 top-1/2 w-6 h-6 bg-[#f8fafc] rounded-full border-r border-white shadow-inner"></div>
                <div class="absolute -right-3 top-1/2 w-6 h-6 bg-[#f8fafc] rounded-full border-l border-white shadow-inner"></div>
            </div>

            <!-- Add to Apple Wallet / Google Pay mockup -->
            <button class="mt-8 mx-auto w-full max-w-[280px] bg-slate-900 text-white rounded-full py-4 text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-3 shadow-xl hover:bg-gold transition">
                <i class="fab fa-apple text-lg"></i> Add to Wallet
            </button>
            <p class="text-[9px] text-center text-slate-400 mt-4 uppercase tracking-[0.2em]">Powered by S&H Digital Systems</p>
        </div>
    </div>

</body>
</html>
